<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - DDS</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth-premium.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-box">
      <div class="auth-header">
        <div class="logo-large">
          <span class="logo-icon">🛡️</span>
          <span class="logo-text">DDS</span>
        </div>
        <h2>Welcome Back</h2>
        <p>Sign in to access your security dashboard</p>
      </div>
      
      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            placeholder="Enter your email" 
            required
            autocomplete="email"
          >
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            placeholder="Enter your password" 
            required
            autocomplete="current-password"
          >
        </div>
        
        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" id="remember">
            <span>Remember me</span>
          </label>
          <a href="forgot-password.html" class="link">Forgot password?</a>
        </div>
        
        <button type="submit" class="btn-submit" id="loginBtn">
          <span class="btn-text">Sign In</span>
          <span class="btn-loader" style="display:none;">
            <span class="loader"></span>
          </span>
        </button>
        
        <div id="message" class="message"></div>
      </form>
      
      <div class="auth-footer">
        <p>Don't have an account? <a href="register.html" class="link-primary">Create one</a></p>
        <p><a href="index.html" class="link">← Back to home</a></p>
      </div>
    </div>
    
    <div class="auth-visual">
      <div class="visual-content">
        <h3>🔒 Secure Login</h3>
        <p>Your connection is encrypted and monitored for suspicious activity</p>
        <div class="security-features">
          <div class="security-item">
            <span class="security-icon">✓</span>
            <span>JWT Authentication</span>
          </div>
          <div class="security-item">
            <span class="security-icon">✓</span>
            <span>Brute Force Protection</span>
          </div>
          <div class="security-item">
            <span class="security-icon">✓</span>
            <span>Real-time Monitoring</span>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <script src="js/auth.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      await handleLogin();
    });
  </script>
</body>
</html>
