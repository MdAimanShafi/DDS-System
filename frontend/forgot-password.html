<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - DDS</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth-premium.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-box">
      <div class="auth-header">
        <div class="logo-large">
          <span class="logo-icon">🛡️</span>
          <span class="logo-text">DDS</span>
        </div>
        <h2>Reset Password</h2>
        <p>Enter your email to receive a password reset link</p>
      </div>
      
      <form id="forgotPasswordForm" class="auth-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            placeholder="Enter your registered email" 
            required
            autocomplete="email"
          >
        </div>
        
        <button type="submit" class="btn-submit" id="resetBtn">
          <span class="btn-text">Send Reset Link</span>
          <span class="btn-loader" style="display:none;">
            <span class="loader"></span>
          </span>
        </button>
        
        <div id="message" class="message"></div>
      </form>
      
      <div class="auth-footer">
        <p>Remember your password? <a href="login.html" class="link-primary">Sign in</a></p>
        <p><a href="index.html" class="link">← Back to home</a></p>
      </div>
    </div>
    
    <div class="auth-visual">
      <div class="visual-content">
        <h3>🔐 Secure Recovery</h3>
        <p>We'll send you a secure link to reset your password</p>
        <div class="security-features">
          <div class="security-item">
            <span class="security-icon">✓</span>
            <span>Encrypted Email</span>
          </div>
          <div class="security-item">
            <span class="security-icon">✓</span>
            <span>Time-Limited Token</span>
          </div>
          <div class="security-item">
            <span class="security-icon">✓</span>
            <span>Secure Reset Process</span>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <script src="js/auth.js"></script>
  <script>
    document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      await handleForgotPassword();
    });
  </script>
</body>
</html>
