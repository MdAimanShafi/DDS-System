<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password - DDS</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-box">
      <div class="auth-header">
        <div class="logo-large">
          <span class="logo-icon">🛡️</span>
          <span class="logo-text">DDS</span>
        </div>
        <h2>Change Password</h2>
        <p>Update your password to restore access</p>
      </div>

      <form id="changePasswordForm" class="auth-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            placeholder="Enter your registered email"
            required
            autocomplete="email"
          >
        </div>

        <div class="form-group">
          <label for="currentPassword">Current Password</label>
          <input
            type="password"
            id="currentPassword"
            placeholder="Enter your current password"
            required
            autocomplete="current-password"
          >
        </div>

        <div class="form-group">
          <label for="newPassword">New Password</label>
          <input
            type="password"
            id="newPassword"
            placeholder="Enter a new password"
            required
            autocomplete="new-password"
          >
        </div>

        <div class="form-group">
          <label for="confirmNewPassword">Confirm New Password</label>
          <input
            type="password"
            id="confirmNewPassword"
            placeholder="Confirm new password"
            required
            autocomplete="new-password"
          >
        </div>

        <button type="submit" class="btn-submit" id="changePasswordBtn">
          <span class="btn-text">Change Password</span>
          <span class="btn-loader" style="display:none;"><span class="loader"></span></span>
        </button>

        <div id="message" class="message"></div>
      </form>

      <div class="auth-footer">
        <p><a href="login.html" class="link-primary">Back to login</a></p>
        <p><a href="index.html" class="link">← Home</a></p>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      await handleChangePassword();
    });
  </script>
</body>
</html>
